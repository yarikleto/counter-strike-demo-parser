<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Background: GitHub-dark-compatible near-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0f14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Amber-to-blue accent bar (bottom edge signature) -->
    <linearGradient id="accentBar" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="12%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#d97706" stop-opacity="0.35"/>
      <stop offset="80%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <!-- Top edge: subtle warm light leak -->
    <linearGradient id="topEdge" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="10%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="75%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="92%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <!-- Data stream: raw bytes incoming (amber) -->
    <linearGradient id="streamIn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.45"/>
    </linearGradient>

    <!-- Data stream: decoded output (blue) -->
    <linearGradient id="streamOut" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <!-- Icon ring gradient: warm gold -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Soft aura behind the icon -->
    <radialGradient id="iconAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.07"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Rounded clip -->
    <clipPath id="clip">
      <rect x="0" y="0" width="800" height="200" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Base background -->
    <rect width="800" height="200" fill="url(#bg)"/>

    <!-- === BACKGROUND: angular tactical lines === -->
    <!-- Left side: warm amber diagonals (raw data side) -->
    <g opacity="0.025" stroke="#f59e0b" stroke-width="0.5" fill="none">
      <line x1="50" y1="0" x2="0" y2="50"/>
      <line x1="100" y1="0" x2="0" y2="100"/>
      <line x1="150" y1="0" x2="0" y2="150"/>
      <line x1="200" y1="0" x2="0" y2="200"/>
      <line x1="250" y1="0" x2="50" y2="200"/>
    </g>
    <!-- Right side: cool blue diagonals (decoded data side) -->
    <g opacity="0.02" stroke="#3b82f6" stroke-width="0.5" fill="none">
      <line x1="750" y1="0" x2="800" y2="50"/>
      <line x1="700" y1="0" x2="800" y2="100"/>
      <line x1="650" y1="0" x2="800" y2="150"/>
      <line x1="600" y1="0" x2="800" y2="200"/>
      <line x1="550" y1="0" x2="750" y2="200"/>
    </g>

    <!-- Corner accents -->
    <polygon points="0,0 50,0 0,50" fill="#f59e0b" opacity="0.012"/>
    <polygon points="800,200 750,200 800,150" fill="#3b82f6" opacity="0.012"/>

    <!-- === ICON AURA === -->
    <circle cx="88" cy="96" r="75" fill="url(#iconAura)"/>

    <!-- === DATA STREAMS === -->
    <!-- Raw bytes flowing toward icon -->
    <g opacity="0.14">
      <rect x="0" y="89" width="45" height="1.5" fill="url(#streamIn)" rx="0.75"/>
      <rect x="0" y="96" width="40" height="1" fill="url(#streamIn)" rx="0.5" opacity="0.5"/>
      <rect x="0" y="102" width="36" height="1" fill="url(#streamIn)" rx="0.5" opacity="0.3"/>
    </g>
    <!-- Decoded data flowing out -->
    <g opacity="0.09">
      <rect x="660" y="89" width="140" height="1.5" fill="url(#streamOut)" rx="0.75"/>
      <rect x="680" y="96" width="120" height="1" fill="url(#streamOut)" rx="0.5" opacity="0.5"/>
      <rect x="695" y="102" width="105" height="1" fill="url(#streamOut)" rx="0.5" opacity="0.3"/>
    </g>

    <!-- === RAW HEX DATA (left margin) === -->
    <g font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="8" fill="#f59e0b" opacity="0.09">
      <text x="6" y="38">48 4C 54 56 44 45 4D 4F</text>
      <text x="10" y="50">00 00 03 E8 00 08 80 01</text>
      <text x="4" y="156">07 1A 0F 63 73 5F 64 75</text>
      <text x="8" y="168">73 74 32 2E 62 73 70 00</text>
    </g>

    <!-- === DECODED OUTPUT (right margin) === -->
    <g font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="8" fill="#3b82f6" text-anchor="end" opacity="0.07">
      <text x="794" y="38">map: de_dust2</text>
      <text x="794" y="50">tickRate: 128</text>
      <text x="794" y="156">player.weapon</text>
      <text x="794" y="168">event: headshot</text>
    </g>

    <!-- === SCOPE / CROSSHAIR ICON === -->
    <!-- Sniper scope + code brackets fusion. Center at (88, 96) for optical centering with text. -->
    <g transform="translate(88, 96)">
      <!-- Outer ring: ghosted, wide -->
      <circle cx="0" cy="0" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.18"/>

      <!-- Main ring: the defining scope element -->
      <circle cx="0" cy="0" r="28" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.85"/>

      <!-- Cardinal tick marks (inward from ring) -->
      <line x1="0" y1="-28" x2="0" y2="-23" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="23" x2="0" y2="28" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-28" y1="0" x2="-23" y2="0" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="23" y1="0" x2="28" y2="0" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Ordinal tick marks (45deg, subtle) -->
      <line x1="-19.8" y1="-19.8" x2="-16.3" y2="-16.3" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
      <line x1="19.8" y1="-19.8" x2="16.3" y2="-16.3" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
      <line x1="-19.8" y1="19.8" x2="-16.3" y2="16.3" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
      <line x1="19.8" y1="19.8" x2="16.3" y2="16.3" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

      <!-- Extended crosshair: vertical only (horizontal replaced by brackets) -->
      <line x1="0" y1="-48" x2="0" y2="-33" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
      <line x1="0" y1="33" x2="0" y2="48" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.25"/>

      <!-- Inner crosshair: bright and precise -->
      <line x1="0" y1="-15" x2="0" y2="-5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="5" x2="0" y2="15" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-15" y1="0" x2="-5" y2="0" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="5" y1="0" x2="15" y2="0" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Center dot -->
      <circle cx="0" cy="0" r="2" fill="#fbbf24"/>
      <!-- Center glow -->
      <circle cx="0" cy="0" r="5" fill="#fbbf24" opacity="0.12"/>

      <!-- Code angle brackets: replace horizontal crosshair extensions -->
      <!-- Left < bracket -->
      <polyline points="-35,-11 -47,0 -35,11" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
      <!-- Right > bracket -->
      <polyline points="35,-11 47,0 35,11" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    </g>

    <!-- === TYPOGRAPHY === -->
    <!-- Text block vertically centered with icon. Top of "counter-strike" ~y=46, bottom of badges ~y=164 -->
    <!-- Block height ~118px, centered at ~y=105, close to icon center y=96. -->

    <!-- "counter-strike" — bold, white, commanding -->
    <text x="158" y="70" fill="#f1f5f9" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="33" font-weight="700" letter-spacing="-0.5">counter-strike</text>

    <!-- "demo-parser" — amber, lighter weight, wider tracking -->
    <text x="159" y="104" fill="#fbbf24" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="29" font-weight="400" letter-spacing="2.5">demo-parser</text>

    <!-- Tagline — monospace, muted -->
    <text x="161" y="129" fill="#6b7280" font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="11.5" letter-spacing="0.3">Parse .dem files. Extract everything.</text>

    <!-- Tech badges -->
    <g transform="translate(161, 140)">
      <!-- TypeScript -->
      <rect x="0" y="0" width="72" height="18" rx="4" fill="#111827" stroke="#1e293b" stroke-width="1"/>
      <text x="36" y="12" fill="#94a3b8" font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="9" text-anchor="middle" letter-spacing="0.5">TypeScript</text>

      <!-- CS:GO -->
      <rect x="80" y="0" width="50" height="18" rx="4" fill="#111827" stroke="#1e293b" stroke-width="1"/>
      <text x="105" y="12" fill="#94a3b8" font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="9" text-anchor="middle" letter-spacing="0.5">CS:GO</text>

      <!-- CS2 -->
      <rect x="138" y="0" width="38" height="18" rx="4" fill="#111827" stroke="#1e293b" stroke-width="1"/>
      <text x="157" y="12" fill="#94a3b8" font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="9" text-anchor="middle" letter-spacing="0.5">CS2</text>
    </g>

    <!-- === EDGE ACCENTS === -->
    <!-- Top edge: subtle light bleed -->
    <rect x="0" y="0" width="800" height="1" fill="url(#topEdge)"/>

    <!-- Bottom accent bar: the signature amber-to-blue gradient -->
    <rect x="0" y="197" width="800" height="3" fill="url(#accentBar)"/>
  </g>

  <!-- Outer border: subtle containment -->
  <rect x="0.5" y="0.5" width="799" height="199" rx="12" ry="12" fill="none" stroke="#1e293b" stroke-width="1"/>
</svg>